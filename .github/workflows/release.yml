name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (no publish, no push)"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  HOMEBREW_TAP_REPO: ahkohd/homebrew-omni

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install npm dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Quality gates (Rust)
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo build --workspace --bins
          cargo test --workspace

      - name: Quality gates (npm)
        if: ${{ hashFiles('package.json') != '' }}
        run: npm pack --dry-run

      - name: Calculate new version
        id: version
        run: |
          current=$(grep -m1 'version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump_type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "current=$current" >> $GITHUB_OUTPUT
          echo "new=$new" >> $GITHUB_OUTPUT
          echo "Bumping $current -> $new"

      - name: Update Cargo version
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.new }}"/' Cargo.toml
          cargo update --workspace

      - name: Update npm version
        if: ${{ hashFiles('package.json') != '' }}
        run: npm version "${{ steps.version.outputs.new }}" --no-git-tag-version

      - name: Configure git
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git add Cargo.toml Cargo.lock
          if [ -f package.json ]; then git add package.json; fi
          if [ -f package-lock.json ]; then git add package-lock.json; fi
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "HEAD:${BRANCH}"
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Publish omni crate
        if: ${{ !inputs.dry_run }}
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        if: ${{ !inputs.dry_run }}
        run: sleep 30

      - name: Verify npm auth
        if: ${{ !inputs.dry_run && hashFiles('package.json') != '' }}
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm package
        if: ${{ !inputs.dry_run && hashFiles('package.json') != '' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "## Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Current version: ${{ steps.version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          echo "- New version: ${{ steps.version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
          echo "- Would commit, tag, and push v${{ steps.version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
          echo "- Would publish omni to crates.io" >> $GITHUB_STEP_SUMMARY
          cargo publish --dry-run --allow-dirty
          if [ -f package.json ]; then
            echo "- Would publish npm package" >> $GITHUB_STEP_SUMMARY
            npm publish --dry-run --access public
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: release
    if: ${{ !inputs.dry_run }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bins --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../omni-${{ matrix.target }}.tar.gz omni omni-transcribe-ui omni-ui-tail

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-${{ matrix.target }}
          path: omni-${{ matrix.target }}.tar.gz

  publish:
    name: Publish Release
    needs: [release, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    name: Update Homebrew Tap
    needs: [release, publish]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          echo "macos_arm64=$(shasum -a 256 artifacts/omni-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "macos_x86_64=$(shasum -a 256 artifacts/omni-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x86_64=$(shasum -a 256 artifacts/omni-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_OMNI_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          SHA_MACOS_ARM64="${{ steps.sha.outputs.macos_arm64 }}"
          SHA_MACOS_X86_64="${{ steps.sha.outputs.macos_x86_64 }}"
          SHA_LINUX_X86_64="${{ steps.sha.outputs.linux_x86_64 }}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git
          cd "${HOMEBREW_TAP_REPO##*/}"

          mkdir -p Formula
          cat > Formula/omni.rb << 'FORMULA'
          class Omni < Formula
            desc "CLI for realtime transcription"
            homepage "https://github.com/ahkohd/omni"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/ahkohd/omni/releases/download/vVERSION_PLACEHOLDER/omni-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/ahkohd/omni/releases/download/vVERSION_PLACEHOLDER/omni-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_X86_64_PLACEHOLDER"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/ahkohd/omni/releases/download/vVERSION_PLACEHOLDER/omni-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_LINUX_X86_64_PLACEHOLDER"
              end
            end

            def install
              bin.install "omni"
              bin.install "omni-transcribe-ui"
              bin.install "omni-ui-tail"
            end

            test do
              system "#{bin}/omni", "--version"
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/omni.rb
          sed -i "s/SHA_MACOS_ARM64_PLACEHOLDER/${SHA_MACOS_ARM64}/g" Formula/omni.rb
          sed -i "s/SHA_MACOS_X86_64_PLACEHOLDER/${SHA_MACOS_X86_64}/g" Formula/omni.rb
          sed -i "s/SHA_LINUX_X86_64_PLACEHOLDER/${SHA_LINUX_X86_64}/g" Formula/omni.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/omni.rb
          git commit -m "omni ${VERSION}"
          git push
